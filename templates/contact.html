<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="static/Css/contact.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
      body {
          font-family: 'Poppins', sans-serif;
          background-color: #ced1fd;
}
         
    

.navbar {
    background: linear-gradient(90deg, #769bdb 0%, #6a11cb 100%); /* Gradient background */
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* Subtle shadow for depth */
    padding: 1rem 2rem; /* Adjust padding for a wider navbar */
    transition: all 0.3s ease;
}

/* Navbar Brand */
.navbar-brand {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: #ecf0f1;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); /* Shadow for text */
    letter-spacing: 2px; /* Spacing between letters */
    transition: color 0.3s ease, transform 0.3s ease;
}

.navbar-brand:hover {
    color: #f39c12; /* Bright color on hover */
    transform: scale(1.05); /* Slight scale effect */
}

/* Navbar Toggle (Mobile) */
.navbar-toggler-icon {
    background-color: #ecf0f1; /* White color for the toggle icon */
    border-radius: 4px;
    transition: all 0.3s ease;
}

.navbar-toggler-icon:hover {
    background-color: #f39c12; /* Hover effect */
}

/* Navbar Links */
.navbar-nav .nav-link {
    font-size: 1.2rem;
    font-weight: 600;
    color: #ecf0f1;
    transition: color 0.3s ease, transform 0.3s ease;
    padding: 0.8rem 1.2rem;
}

.navbar-nav .nav-link:hover {
    color: #e3cefd; /* Hover color for links */
    text-decoration: underline;
    transform: translateY(-3px); /* Slight hover lift effect */
}


      .container {
          max-width: 500px;
          margin-top: 150px;
      }

      .card {
          background-color: #ffffff;
          border-radius: 15px;
          box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
          padding: 30px;
          transition: background-color 0.3s ease, transform 0.3s ease;
      }

      h3 {
          text-align: center;
          margin-bottom: 20px;
          color: #343a40;
      }
      .form-container {
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            padding: 30px;
            width: 400px;
            border-radius: 8px;
        }
        label {
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            display: block;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            color: #555;
            margin-bottom: 8px;
            display: block;
        }

        input[type="text"], input[type="email"], textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            color: #333;
        }

        input[type="text"]:focus, input[type="email"]:focus, textarea:focus {
            border-color: #4CAF50;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }


      .form-label {
          color: #000000;
          font-weight: bold;
          margin-bottom: 5px;
          display: inline-block;
      }

      .form-control {
          width: 100%;
          padding: 10px;
          margin: 10px 0;
          border: 1px solid #ddd;
          border-radius: 8px;
          font-size: 1rem;
      }

      .btn-primary {
          background-color: #6766db;
          color: white;
          border: none;
          border-radius: 8px;
          font-size: 1.1rem;
          cursor: pointer;
          transition: background-color 0.3s ease;
          width: 100%;
          padding: 10px;
      }

      .btn-primary:hover {
          background-color: #6a11cb;
      }

      .contact-form {
          padding: 30px;
      }

      .alert {
          margin-bottom: 20px;
      }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('home') }}">I AM HERE TO HELP "YOU"</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                </li>
                {% if session.get('email') %}
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                    </li>
                {% else %}
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('login') }}">Login</a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
  </nav>

  <section>
    <div class="container">
        <div class="card">
            <h3>Contact Us</h3><hr>
            <div id="result"></div>

            <form action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="764cdfdd-da26-4394-9cf4-baa9d06609ec">
            
          <!-- Name Field -->
          <label for="name">Your Name</label>
          <input type="text" name="name" placeholder="Enter your name" required>

          <!-- Email Field -->
          <label for="email">Your Email</label>
          <input type="email" name="email" placeholder="Enter your email" required>

          <!-- Message Field -->
          <label for="message">Your Message</label>
          <textarea name="message" placeholder="Type your message here..." rows="5" required></textarea>

          <!-- Submit Button -->
          <button type="submit">Submit Form</button>
            
            </form>
        </div>
    </div>
  </section>
</body>
</html>
