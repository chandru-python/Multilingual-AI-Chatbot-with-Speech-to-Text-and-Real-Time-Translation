<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registration</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="static/Css/register.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">

  <style>
      body {
          font-family: 'Poppins', sans-serif;
          background-color: #ced1fd;
      }

   
      .navbar {
    background: linear-gradient(90deg, #769bdb 0%, #6a11cb 100%); /* Gradient background */
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2); /* Subtle shadow for depth */
    padding: 1rem 2rem; /* Adjust padding for a wider navbar */
    transition: all 0.3s ease;
}

/* Navbar Brand */
.navbar-brand {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    font-size: 1.8rem;
    font-weight: 700;
    color: #ecf0f1;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5); /* Shadow for text */
    letter-spacing: 2px; /* Spacing between letters */
    transition: color 0.3s ease, transform 0.3s ease;
}

.navbar-brand:hover {
    color: #f39c12; /* Bright color on hover */
    transform: scale(1.05); /* Slight scale effect */
}

/* Navbar Toggle (Mobile) */
.navbar-toggler-icon {
    background-color: #ecf0f1; /* White color for the toggle icon */
    border-radius: 4px;
    transition: all 0.3s ease;
}

.navbar-toggler-icon:hover {
    background-color: #f39c12; /* Hover effect */
}

/* Navbar Links */
.navbar-nav .nav-link {
    font-size: 1.2rem;
    font-weight: 600;
    color: #ecf0f1;
    transition: color 0.3s ease, transform 0.3s ease;
    padding: 0.8rem 1.2rem;
}

.navbar-nav .nav-link:hover {
    color: #f39c12; /* Hover color for links */
    text-decoration: underline;
    transform: translateY(-3px); /* Slight hover lift effect */
}

/* Active Link */
.navbar-nav .nav-link.active {
    color: #f39c12; /* Highlight active link */
}

      .container {
          max-width: 500px;
          margin-top: 150px;
      }

      .card {
          background-color: #ffffff;
          border-radius: 15px;
          box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
          padding: 30px;
          transition: background-color 0.3s ease, transform 0.3s ease;
      }

      h2 {
          text-align: center;
          margin-bottom: 20px;
          color: #343a40;
      }

      label {
          color: #000000;
          font-weight: bold;
          margin-bottom: 5px;
          display: inline-block;
      }

      input[type="text"], input[type="email"], input[type="password"], input[type="submit"] {
          width: 100%;
          padding: 10px;
          margin: 10px 0;
          border: 1px solid #ddd;
          border-radius: 8px;
          font-size: 1rem;
      }

      input[type="submit"] {
          background-color: #6766db;
          color: white;
          border: none;
          border-radius: 8px;
          font-size: 1.1rem;
          cursor: pointer;
          transition: background-color 0.3s ease;
      }

      input[type="submit"]:hover {
          background-color: #6a11cb;
      }


      .register-link {
          text-align: center;
          margin-top: 15px;
          font-size: 1rem;
      }

      .register-link a {
          color: #1e00c9;
          text-decoration: none;
      }

      .register-link a:hover {
          text-decoration: underline;
      }

      .alert {
          margin-bottom: 20px;
      }
  </style>
</head>
  
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('home') }}">I AM HERE TO HELP "YOU"</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" href="{{ url_for('home') }}">Home</a>
                </li>
                {% if session.get('email') %}
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('logout') }}">Logout</a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
  </nav>

  <section>
    <div class="container">
        <div class="card">
            <h2>Registration</h2>
            {% for message in get_flashed_messages() %}
                <div class="alert alert-danger">
                    {{ message }}
                </div>
            {% endfor %}
        
            <form method="POST" action="{{ url_for('register') }}">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" required>
                </div>
                
                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="form-group">
                    <label for="number">Phone Number:</label>
                    <input type="text" id="number" name="number" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <div class="form-group">
                    <label for="location">Location:</label>
                    <input type="text" id="location" name="location" required>
                </div>
                
                <input type="submit" value="Register">
            </form>

            <div class="register-link">
                Already have an account? <a href="{{ url_for('login') }}">Login here</a>
            </div>
        </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
